workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    environment:
      flutter: 3.44.2
      xcode: 16.4
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.sakura9625.divingprepapp
        provisioning_profile_specifier: "Diving Prep App ios_app_store 1782111440"
    scripts:
      - name: Set up Flutter
        script: |
          flutter --version
          flutter pub get
      - name: Pod install
        script: |
          cd ios && pod install
      - name: Build iOS
        script: |
          flutter build ipa --release
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
